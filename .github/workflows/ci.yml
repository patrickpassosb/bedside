name: CI

on:
  # Run on every push to any branch.
  push:
  # Also run on pull requests targeting master — covers PRs opened from forks,
  # which otherwise wouldn't trigger the `push` event in this repo.
  pull_request:
    branches: [master]

# Cancel superseded runs on the same ref — a new push cancels the previous one.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend — typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bedside-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

  frontend:
    name: Frontend — build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bedside-frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # `bun run build` is `tsc --noEmit && vite build` — covers both
      # typecheck and production build in one step.
      - name: Build
        run: bun run build
